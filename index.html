<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TripOrga</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f5f2;--bg2:#efede9;--card:#fff;
  --border:#e8e3db;--border-dark:#d5cfc6;
  --text:#1a1714;--text2:#4a4540;--muted:#8a8480;
  --accent:#f0a500;--accent-light:#fff8e6;--accent-dark:#c27f00;
  --green:#16a34a;--green-bg:#f0fdf4;
  --red:#dc2626;
  --shadow-sm:0 1px 4px rgba(0,0,0,0.06);
  --shadow-md:0 4px 16px rgba(0,0,0,0.09);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.12);
  --radius:14px;--font:'Inter',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;-webkit-font-smoothing:antialiased}

header{background:rgba(255,255,255,0.93);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 2rem;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.logo{display:flex;align-items:center;gap:0.65rem}
.logo-icon{font-size:1.4rem}
.logo-text{font-size:1.1rem;font-weight:700;letter-spacing:-0.02em}
.logo-text em{color:var(--accent);font-style:normal}
.header-right{display:flex;align-items:center;gap:0.6rem}
.share-btn{background:var(--bg2);border:1px solid var(--border-dark);color:var(--text2);padding:0.42rem 0.9rem;border-radius:9px;font-size:0.78rem;font-weight:500;cursor:pointer;font-family:var(--font);transition:all 0.2s}
.share-btn:hover{border-color:var(--accent);color:var(--accent-dark)}
.add-btn{background:var(--accent);border:none;color:#fff;padding:0.42rem 1.1rem;border-radius:9px;font-size:0.8rem;font-weight:700;cursor:pointer;font-family:var(--font);box-shadow:0 2px 8px rgba(240,165,0,0.3);transition:all 0.2s}
.add-btn:hover{background:var(--accent-dark)}

main{max-width:1100px;margin:0 auto;padding:1.75rem 1.5rem}

.tabs{display:flex;gap:0.2rem;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:0.25rem;width:fit-content;margin-bottom:1.5rem;box-shadow:var(--shadow-sm)}
.tab{padding:0.5rem 1.2rem;border-radius:9px;font-size:0.84rem;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:var(--font);transition:all 0.18s;white-space:nowrap}
.tab:hover{color:var(--text2)}
.tab.active{background:var(--accent);color:#fff;font-weight:700;box-shadow:0 2px 8px rgba(240,165,0,0.25)}

.filter-bar{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:0.85rem 1.1rem;margin-bottom:1.4rem;display:flex;flex-wrap:wrap;gap:0.85rem;align-items:flex-end;box-shadow:var(--shadow-sm)}
.filter-group{display:flex;flex-direction:column;gap:0.35rem}
.filter-label{font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:var(--muted)}
.filter-pills{display:flex;gap:0.25rem}
.fpill{background:var(--bg);border:1px solid var(--border);color:var(--text2);padding:0.3rem 0.75rem;border-radius:20px;font-size:0.78rem;font-weight:500;cursor:pointer;font-family:var(--font);transition:all 0.15s;white-space:nowrap}
.fpill:hover{border-color:var(--accent);color:var(--accent-dark)}
.fpill.active{background:var(--accent-light);border-color:var(--accent);color:var(--accent-dark);font-weight:600}
.filter-select{background:var(--bg);border:1px solid var(--border);color:var(--text2);padding:0.35rem 0.75rem;border-radius:9px;font-size:0.79rem;font-family:var(--font);cursor:pointer;outline:none}
.filter-select:focus{border-color:var(--accent)}
.filter-input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:0.35rem 0.7rem;border-radius:9px;font-size:0.8rem;font-family:var(--font);width:80px;outline:none}
.filter-input:focus{border-color:var(--accent)}
.filter-reset{background:none;border:1px solid var(--border-dark);color:var(--muted);padding:0.32rem 0.75rem;border-radius:9px;font-size:0.75rem;cursor:pointer;font-family:var(--font);transition:all 0.15s;align-self:flex-end}
.filter-reset:hover{color:var(--text2);border-color:var(--text2)}

.section-title{font-size:0.63rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);margin-bottom:1.1rem;display:flex;align-items:center;gap:0.75rem}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:1rem}

.stale-banner{background:rgba(220,38,38,0.09);border-bottom:1px solid rgba(220,38,38,0.18);padding:0.28rem 0.85rem;font-size:0.71rem;font-weight:600;color:var(--red);display:flex;align-items:center;gap:0.4rem}
.ota-banner{padding:0.32rem 1rem;font-size:0.72rem;font-weight:700;color:#fff;display:flex;align-items:center;gap:0.5rem}

/* VOL CARD */
.vol-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);animation:fadeUp 0.22s ease both;transition:all 0.2s;overflow:hidden}
.vol-card:hover{box-shadow:var(--shadow-md);border-color:var(--border-dark);transform:translateY(-1px)}
.vol-card-header{padding:1rem 1.15rem 0.9rem;display:flex;align-items:center;justify-content:space-between}
.airline-badge{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:10px;font-size:0.7rem;font-weight:800;color:#fff;flex-shrink:0}
.vol-dest-pill{display:flex;align-items:center;gap:0.35rem;font-size:0.78rem;font-weight:500;color:var(--text2);background:var(--bg);border:1px solid var(--border);padding:0.25rem 0.65rem;border-radius:20px}

.flight-rows{background:var(--bg);border-radius:10px;padding:0.85rem 1rem;margin:0 1.15rem 0.875rem;display:flex;flex-direction:column;gap:0.6rem}
.flight-row{display:grid;grid-template-columns:38px 1fr auto;align-items:center;gap:0.5rem}
.flight-dir{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted)}
.flight-seg{display:flex;align-items:center;gap:0.5rem;flex:1}
.ftime{font-size:1.05rem;font-weight:700;letter-spacing:-0.02em;min-width:40px}
.ftime.na{font-size:0.82rem;color:var(--muted);font-weight:400}
.fapt{font-size:0.63rem;color:var(--muted);font-weight:500}
.fline{flex:1;display:flex;align-items:center;gap:0.2rem}
.fdot{width:5px;height:5px;border-radius:50%;background:var(--border-dark);flex-shrink:0}
.fdash{flex:1;height:1px;background:var(--border-dark)}
.fplane{font-size:0.68rem;color:var(--muted)}
.fstops{font-size:0.63rem;font-weight:600;padding:0.15rem 0.45rem;border-radius:10px;white-space:nowrap;color:var(--green);background:var(--green-bg)}
.fstops.escale{color:#b45309;background:#fffbeb}
.fdivider{height:1px;background:var(--border);margin:0.1rem 0}
.fdur{font-size:0.67rem;color:var(--muted);text-align:center;margin-top:0.1rem}
.fnum{font-size:0.63rem;color:var(--muted);text-align:center;margin-top:0.05rem;letter-spacing:0.02em}

.vol-card-footer{padding:0.75rem 1.15rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem}
.dates-row{display:flex;gap:0.4rem;flex-wrap:wrap}
.date-chip{font-size:0.73rem;color:var(--text2);background:var(--bg2);border:1px solid var(--border);padding:0.22rem 0.55rem;border-radius:6px;font-weight:500}
.price-wrap{text-align:right}
.price-main{font-size:1.75rem;font-weight:700;color:var(--accent-dark);letter-spacing:-0.03em;line-height:1}
.price-sub{font-size:0.65rem;color:var(--muted);margin-top:0.1rem}
.vol-notes{font-size:0.76rem;color:var(--muted);font-style:italic;background:var(--bg);border-radius:8px;padding:0.4rem 0.65rem;margin:0 1.15rem 0.75rem}
.vol-card-actions{padding:0.65rem 1.15rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:0.4rem}
.card-btns{display:flex;gap:0.35rem}
.delete-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:0.27rem 0.6rem;border-radius:7px;font-size:0.7rem;cursor:pointer;font-family:var(--font);transition:all 0.15s}
.delete-btn:hover{border-color:var(--red);color:var(--red)}
.edit-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text2);padding:0.27rem 0.6rem;border-radius:7px;font-size:0.7rem;cursor:pointer;font-family:var(--font);transition:all 0.15s}
.edit-btn:hover{border-color:var(--accent);color:var(--accent-dark)}
.copy-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text2);padding:0.27rem 0.6rem;border-radius:7px;font-size:0.7rem;cursor:pointer;font-family:var(--font);transition:all 0.15s}
.copy-btn:hover{border-color:var(--green);color:var(--green)}
.visit-btn{display:inline-flex;align-items:center;gap:0.35rem;background:var(--accent-light);border:1px solid rgba(240,165,0,0.3);color:var(--accent-dark);padding:0.32rem 0.8rem;border-radius:8px;font-size:0.77rem;font-weight:600;text-decoration:none;transition:all 0.18s;font-family:var(--font)}
.visit-btn:hover{background:var(--accent);color:#fff;border-color:transparent}

/* HOTEL CARD */
.hotel-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);animation:fadeUp 0.22s ease both;transition:all 0.2s;overflow:hidden}
.hotel-card:hover{box-shadow:var(--shadow-md);border-color:var(--border-dark);transform:translateY(-1px)}
.hotel-card-header{border-bottom:1px solid var(--border);padding:0.9rem 1.1rem}
.hotel-header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.3rem}
.hotel-name{font-size:0.97rem;font-weight:700;color:var(--text)}
.hotel-header-sub{display:flex;align-items:center;gap:0.5rem;margin-top:0.2rem;flex-wrap:wrap}
.hotel-dest{font-size:0.73rem;color:var(--muted)}
.hotel-quartier{font-size:0.71rem;color:var(--text2);background:var(--bg2);border:1px solid var(--border);padding:0.1rem 0.4rem;border-radius:5px}
.hotel-note-badge{background:#003580;color:#fff;padding:0.15rem 0.42rem;border-radius:5px;font-size:0.72rem;font-weight:800}
.hotel-card-body{padding:0.85rem 1.1rem}
.hotel-dates{display:flex;align-items:stretch;gap:0.5rem;margin-bottom:0.6rem}
.hotel-date-box{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:0.5rem 0.7rem}
.hotel-date-lbl{font-size:0.59rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:0.15rem}
.hotel-date-val{font-size:0.83rem;font-weight:600;color:var(--text)}
.hotel-date-sep{display:flex;align-items:center;color:var(--muted);font-size:1rem}
.hotel-nights-row{font-size:0.77rem;color:var(--text2);margin-bottom:0.55rem}
.hotel-notes{font-size:0.76rem;color:var(--muted);font-style:italic;background:var(--bg);border-radius:8px;padding:0.4rem 0.65rem;margin-bottom:0.6rem}
.hotel-card-footer{padding:0.65rem 1.1rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.hotel-price{font-size:1.4rem;font-weight:800;color:var(--green);letter-spacing:-0.02em;line-height:1;cursor:pointer}
.hotel-price-lbl{font-size:0.6rem;color:var(--muted);margin-top:0.06rem}
.hotel-total{font-size:0.72rem;color:var(--green);font-weight:600;margin-top:0.1rem;display:none}

/* VOYAGE CARD */
.voyage-card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--radius);padding:1.1rem;box-shadow:var(--shadow-sm);animation:fadeUp 0.22s ease both;transition:all 0.2s}
.voyage-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.voyage-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.75rem}
.voyage-left{display:flex;align-items:flex-start;gap:0.7rem}
.voyage-emoji{width:42px;height:42px;border-radius:10px;background:var(--accent-light);border:1px solid rgba(240,165,0,0.2);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.voyage-name{font-size:1rem;font-weight:700;color:var(--text)}
.voyage-sub{font-size:0.73rem;color:var(--muted);margin-top:0.14rem}
.voyage-budget{font-size:0.82rem;font-weight:700;color:var(--accent-dark);margin-top:0.3rem;padding:0.25rem 0.6rem;background:var(--accent-light);border-radius:7px;display:inline-block}
.voyage-notes{font-size:0.76rem;color:var(--muted);font-style:italic;background:var(--bg);border-radius:8px;padding:0.42rem 0.7rem;margin-bottom:0.7rem}
.voyage-linked{display:flex;flex-direction:column;gap:0.45rem;margin-bottom:0.7rem}
.voyage-linked-item{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:0.55rem 0.85rem;font-size:0.79rem;color:var(--text2)}
.voyage-linked-label{font-size:0.59rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:0.18rem}
.voyage-btns{display:flex;gap:0.4rem;flex-wrap:wrap}
.voyage-btn{display:inline-flex;align-items:center;gap:0.3rem;background:var(--accent-light);border:1px solid rgba(240,165,0,0.3);color:var(--accent-dark);padding:0.3rem 0.7rem;border-radius:7px;font-size:0.76rem;font-weight:600;text-decoration:none;transition:all 0.15s;font-family:var(--font);cursor:pointer}
.voyage-btn:hover{background:var(--accent);color:#fff}

/* FLOATING ADD BTN (mobile) */
.fab{display:none;position:fixed;bottom:1.5rem;right:1.5rem;width:52px;height:52px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:1.5rem;cursor:pointer;box-shadow:0 4px 16px rgba(240,165,0,0.4);z-index:150;align-items:center;justify-content:center;transition:all 0.2s}
.fab:hover{background:var(--accent-dark);transform:scale(1.05)}
@media(max-width:640px){.fab{display:flex}.add-btn{display:none}}

/* UNDO TOAST */
.undo-toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:0.62rem 1.1rem;border-radius:10px;font-size:0.81rem;font-weight:500;z-index:400;display:flex;align-items:center;gap:0.75rem;box-shadow:var(--shadow-md);animation:fadeUp 0.2s ease}
.undo-btn{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:0.2rem 0.6rem;border-radius:6px;font-size:0.75rem;cursor:pointer;font-family:var(--font);font-weight:600}
.undo-btn:hover{background:rgba(255,255,255,0.35)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);z-index:300;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.75rem;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:fadeUp 0.2s ease}
.modal-header{display:flex;align-items:center;gap:0.7rem;margin-bottom:1.4rem}
.modal-emoji{font-size:1.5rem}
.modal-title{font-size:1.05rem;font-weight:700;color:var(--text)}
.form-section{font-size:0.63rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent-dark);margin:0.2rem 0 0.7rem}
.form-group{display:flex;flex-direction:column;gap:0.3rem;margin-bottom:0.85rem}
.form-label{font-size:0.67rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted)}
.optional-tag{font-size:0.6rem;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0;margin-left:0.3rem}
.form-input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:0.55rem 0.85rem;border-radius:9px;font-size:0.84rem;font-family:var(--font);outline:none;transition:border 0.15s;width:100%}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--muted)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.65rem}
.form-divider{height:1px;background:var(--border);margin:0.85rem 0;border:none}
.time-pair{display:flex;align-items:center;gap:0.35rem}
.time-sep{color:var(--muted);font-size:0.85rem;flex-shrink:0}
.form-actions{display:flex;gap:0.5rem;justify-content:flex-end;margin-top:1.4rem}
.btn-cancel{background:none;border:1px solid var(--border);color:var(--muted);padding:0.48rem 1.1rem;border-radius:9px;font-size:0.82rem;cursor:pointer;font-family:var(--font);transition:all 0.15s}
.btn-cancel:hover{border-color:var(--border-dark);color:var(--text2)}
.btn-save{background:var(--accent);border:none;color:#fff;padding:0.48rem 1.3rem;border-radius:9px;font-size:0.82rem;font-weight:700;cursor:pointer;font-family:var(--font);box-shadow:0 2px 8px rgba(240,165,0,0.3);transition:all 0.15s}
.btn-save:hover{background:var(--accent-dark)}
.link-preview{font-size:0.73rem;color:var(--accent-dark);margin-top:0.25rem;padding:0.28rem 0.55rem;background:var(--accent-light);border-radius:6px;word-break:break-all}
.airline-preview{display:flex;align-items:center;gap:0.5rem;margin-top:0.35rem;padding:0.4rem 0.65rem;background:var(--bg);border-radius:8px;border:1px solid var(--border)}
.airline-preview-badge{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:800;color:#fff}
.airline-preview-name{font-size:0.79rem;font-weight:600;color:var(--text)}
.airline-preview-iata{font-size:0.68rem;color:var(--muted)}
.star-selector{display:flex;gap:0.25rem;align-items:center;padding:0.3rem 0}
.star-sel{width:22px;height:22px;cursor:pointer;fill:var(--border-dark);transition:fill 0.15s}
.star-sel:hover,.star-sel.active{fill:var(--accent)}
.toggle-row{display:flex;align-items:center;gap:0.6rem;margin-bottom:0.7rem}
.toggle-label{font-size:0.79rem;color:var(--text2);font-weight:500}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--border-dark);border-radius:20px;cursor:pointer;transition:all 0.2s}
.toggle-slider::before{content:'';position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;left:3px;top:3px;transition:all 0.2s}
.toggle input:checked+.toggle-slider{background:var(--accent)}
.toggle input:checked+.toggle-slider::before{transform:translateX(16px)}
.date-range-wrap{display:flex;gap:0.5rem;align-items:center}
.date-range-wrap .form-input{flex:1}
.date-range-arrow{color:var(--muted);font-size:0.9rem;flex-shrink:0}
.nights-preview{font-size:0.72rem;color:var(--green);font-weight:600;margin-top:0.25rem}
.dur-preview{font-size:0.72rem;color:var(--accent-dark);font-weight:600;margin-top:0.2rem;padding:0.2rem 0.5rem;background:var(--accent-light);border-radius:6px;display:inline-block}

.state-box{grid-column:1/-1;text-align:center;padding:3.5rem 2rem;color:var(--muted)}
.state-box .icon{font-size:2.2rem;margin-bottom:0.7rem}
.state-box p{font-size:0.875rem;line-height:1.7;max-width:280px;margin:0 auto}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:#fff;padding:0.62rem 1.1rem;border-radius:10px;font-size:0.81rem;font-weight:500;z-index:400;opacity:0;transition:opacity 0.3s;pointer-events:none;box-shadow:var(--shadow-md)}
.toast.show{opacity:1}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){
  header{padding:0 1rem}main{padding:1rem}
  .grid{grid-template-columns:1fr}
  .tabs{width:100%}
  .tab{flex:1;text-align:center;font-size:0.77rem;padding:0.48rem 0.3rem}
  .form-row{grid-template-columns:1fr}
  .filter-bar{gap:0.6rem}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-icon">🧳</span>
    <span class="logo-text">Trip<em>Orga</em></span>
  </div>
  <div class="header-right">
    <button class="share-btn" onclick="shareMode()">🔗 Partager</button>
    <button class="add-btn" id="mainAddBtn" onclick="openAddModal()">+ Vol</button>

function getAirlineByName(name){
  if(!name)return{iata:'?',color:'#8a8480',name:'?'};
  const k=name.toLowerCase();
  for(const a of AIRLINES){if(k.includes(a.name.toLowerCase())||a.name.toLowerCase().includes(k))return a}
  return{name,iata:name.slice(0,2).toUpperCase(),color:'#8a8480'};
}
function getCityIata(name){const c=CITIES.find(x=>x.name.toLowerCase()===name.toLowerCase());return c?c.iata:'';}
function getOtaStyle(url){if(!url)return null;const u=url.toLowerCase();for(const[k,v] of Object.entries(OTA_STYLES)){if(u.includes(k))return v}return null;}
function fmtDate(str){if(!str)return'—';return new Date(str).toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})}
function isStale(upd){if(!upd)return false;return(new Date()-new Date(upd))>(STALE_DAYS*86400000)}

function calcDuration(dep,arr){
  if(!dep||!arr)return'';
  const[dh,dm]=dep.split(':').map(Number);
  const[ah,am]=arr.split(':').map(Number);
  let mins=(ah*60+am)-(dh*60+dm);
  if(mins<0)mins+=1440;
  return`${Math.floor(mins/60)}h${String(mins%60).padStart(2,'0')}`;
}
function calcDur(leg){
  const d=leg==='aller'?'vol_hdep':'vol_rhdep';
  const a=leg==='aller'?'vol_harr':'vol_rharr';

  const dur=calcDuration(document.getElementById(d).value,document.getElementById(a).value);
  document.getElementById(durId).value=dur;
  const prev=document.getElementById(prevId);
  if(dur){prev.style.display='inline-block';prev.textContent=`⏱ ${dur}`}else prev.style.display='none';
}

  document.getElementById('vol_iata_dest').value=c?c.iata:'';
}
function onAirlineInput(val){
  const a=getAirlineByName(val);
  const prev=document.getElementById('airline-preview');
  if(val.trim().length>1){
    prev.style.display='flex';
    document.getElementById('ap-badge').style.background=a.color;
    document.getElementById('ap-badge').textContent=a.iata;
    document.getElementById('ap-name').textContent=a.name||val;
    document.getElementById('ap-iata').textContent=`Code IATA: ${a.iata}`;
  } else prev.style.display='none';
}
function toggleEscale(){
  document.getElementById('escale-fields').style.display=document.getElementById('vol_escale_toggle').checked?'block':'none';
}
function updateNightsPreview(){
  const ci=document.getElementById('hotel_checkin').value;
  const co=document.getElementById('hotel_checkout').value;
  const prev=document.getElementById('nights-preview');
  if(ci&&co){
    const n=Math.max(0,(new Date(co)-new Date(ci))/86400000);
    if(n>0){prev.style.display='block';prev.textContent=`🌙 ${n} nuit${n>1?'s':''}`;updateTotalPreview();}
    else prev.style.display='none';
  } else prev.style.display='none';
}
function updateTotalPreview(){
  const ci=document.getElementById('hotel_checkin').value;
  const co=document.getElementById('hotel_checkout').value;
  const prix=parseFloat(document.getElementById('hotel_prix').value)||0;
  if(ci&&co&&prix){
    const n=Math.max(0,(new Date(co)-new Date(ci))/86400000);
    const prev=document.getElementById('nights-preview');
    if(n>0&&prev)prev.textContent=`🌙 ${n} nuit${n>1?'s':''} · Total estimé: ${Math.round(prix*n)}€`;
  }
}
function onHotelLinkInput(val){
  const lp=document.getElementById('hotel_lp');
  if(val.startsWith('http')){lp.style.display='block';try{lp.textContent='🔗 '+new URL(val).hostname;}catch{lp.textContent=val.slice(0,50);}}
  else lp.style.display='none';
}
function setStar(n){
  document.getElementById('hotel_etoiles').value=n;
  document.querySelectorAll('.star-sel').forEach((s,i)=>s.classList.toggle('active',i<n));

function renderStarsHTML(n){

  for(let i=1;i<=5;i++)h+=`<svg width="12" height="12" viewBox="0 0 24 24" style="flex-shrink:0"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill="${i<=n?'#f0a500':'#d5cfc6'}"/></svg>`;

}

let currentTab='vols',currentSort='prix',currentOrigin='all',editingId=null;
let data={vols:[],hotels:[],voyages:[]};
let pendingDelete=null;
const H={apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,'Content-Type':'application/json'};

async function loadAll(){
  const[v,h,voy]=await Promise.all([
    fetch(`${SB_URL}/rest/v1/triporga_vols?order=created_at.desc&limit=200`,{headers:H}).then(r=>r.json()),
    fetch(`${SB_URL}/rest/v1/triporga_hotels?order=created_at.desc&limit=200`,{headers:H}).then(r=>r.json()),
    fetch(`${SB_URL}/rest/v1/triporga_voyages?order=created_at.desc&limit=200`,{headers:H}).then(r=>r.json()),
  ]);
  data={vols:Array.isArray(v)?v:[],hotels:Array.isArray(h)?h:[],voyages:Array.isArray(voy)?voy:[]};
  updateDestFilter();populateVoyageSelects();renderCurrent();
}

function updateDestFilter(){
  const all=[...data.vols.map(v=>v.destination),...data.hotels.map(h=>h.destination)].filter(Boolean);
  const unique=[...new Set(all)].sort();
  const sel=document.getElementById('destFilter');const cur=sel.value;
  sel.innerHTML='<option value="all">Toutes</option>';
  unique.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;if(d===cur)o.selected=true;sel.appendChild(o)});
  const asel=document.getElementById('airlineFilter');
  if(asel){
    const airlines=[...new Set(data.vols.map(v=>v.compagnie).filter(Boolean))].sort();
    const acur=asel.value;
    asel.innerHTML='<option value="all">Toutes</option>';
    airlines.forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;if(a===acur)o.selected=true;asel.appendChild(o)});
  }
}

function populateVoyageSelects(){
  ['vol_voyage','hotel_voyage'].forEach(id=>{
    const sel=document.getElementById(id);if(!sel)return;
    const cur=sel.value;
    sel.innerHTML='<option value="">— Aucun —</option>';
    data.voyages.forEach(v=>{const o=document.createElement('option');o.value=v.id;o.textContent=v.nom;if(String(v.id)===cur)o.selected=true;sel.appendChild(o)});
  });
  const sv=document.getElementById('voyage_vol');
  if(sv){sv.innerHTML='<option value="">— Aucun —</option>';data.vols.forEach(v=>{const o=document.createElement('option');o.value=v.id;o.textContent=`${v.origine}→${v.destination}${v.date_aller?' ('+fmtDate(v.date_aller)+')':''}${v.prix?' · '+v.prix+'€':''}`;sv.appendChild(o)})}
  const sh=document.getElementById('voyage_hotel');
  if(sh){sh.innerHTML='<option value="">— Aucun —</option>';data.hotels.forEach(h=>{const o=document.createElement('option');o.value=h.id;o.textContent=`${h.nom_hotel||h.destination}${h.date_checkin?' ('+fmtDate(h.date_checkin)+')':''}${h.prix_nuit?' · '+h.prix_nuit+'€/nuit':''}`;sh.appendChild(o)})}
}

function getFiltered(items,dateField){
  const dest=document.getElementById('destFilter').value;
  const airline=document.getElementById('airlineFilter')?.value||'all';
  const budget=parseFloat(document.getElementById('budgetFilter')?.value)||null;
  let d=[...items];
  if(currentOrigin!=='all')d=d.filter(x=>x.origine===currentOrigin);
  if(dest!=='all')d=d.filter(x=>x.destination===dest);
  if(airline!=='all')d=d.filter(x=>x.compagnie===airline);
  if(budget)d=d.filter(x=>(x.prix||x.prix_nuit||0)<=budget);
  if(currentSort==='prix')d.sort((a,b)=>(a.prix||a.prix_nuit||0)-(b.prix||b.prix_nuit||0));
  else if(currentSort==='date')d.sort((a,b)=>new Date(a[dateField]||0)-new Date(b[dateField]||0));
  return d;
}

function renderCurrent(){
  const titles={vols:'Vols sauvegardés',hotels:'Hôtels sauvegardés',voyages:'Voyages planifiés'};
  document.getElementById('sectionTitle').textContent=titles[currentTab];
  if(currentTab==='vols')renderVols();
  else if(currentTab==='hotels')renderHotels();
  else renderVoyages();
}

function staleBannerHTML(upd){
  if(!isStale(upd))return'';
  const days=Math.floor((new Date()-new Date(upd))/86400000);
  return`<div class="stale-banner">⚠️ Prix non vérifié depuis ${days} jours</div>`;
}

function flightRowHTML(label,depTime,depApt,arrTime,arrApt,stops,dur,num){
  const depT=depTime||'';const arrT=arrTime||'';
  const isEscale=stops&&stops!=='direct';
  const stopsLabel=isEscale?stops:'Direct';
  const stopsClass=isEscale?'fstops escale':'fstops';
  return`<div class="flight-row">
  <span class="flight-dir">${label}</span>
  <div class="flight-seg">
    <div><div class="ftime${depT?'':' na'}">${depT||'—'}</div><div class="fapt">${depApt||''}</div></div>
    <div class="fline"><div class="fdot"></div><div class="fdash"></div><span class="fplane">✈</span><div class="fdash"></div><div class="fdot"></div></div>
    <div style="text-align:right"><div class="ftime${arrT?'':' na'}">${arrT||'—'}</div><div class="fapt">${arrApt||''}</div></div>
  </div>
  <span class="${stopsClass}">${stopsLabel}</span>
</div>${dur?`<div class="fdur">⏱ ${dur}</div>`:''}${num?`<div class="fnum">${num}</div>`:''}`;
}

    const hasReturn=v.date_retour&&v.date_retour!==v.date_aller;

  const t=el.querySelector('.hotel-total');

  const shown=t.style.display==='block';

function renderVoyages(){
  const grid=document.getElementById('mainGrid');
  const items=[...data.voyages].sort((a,b)=>new Date(a.date_debut||0)-new Date(b.date_debut||0));
  if(!items.length){grid.innerHTML=`<div class="state-box"><div class="icon">🗺</div><p>Aucun voyage créé.<br>Clique sur "+ Voyage" pour commencer.</p></div>`;return;}
  grid.innerHTML=items.map((v,i)=>{
    const vol=data.vols.find(x=>String(x.id)===String(v.vol_id));
    const hotel=data.hotels.find(x=>String(x.id)===String(v.hotel_id));
    // Calcul budget total
    let budget=null;
    if(vol&&vol.prix) budget=(budget||0)+vol.prix;
    if(hotel&&hotel.prix_nuit&&hotel.date_checkin&&hotel.date_checkout){
      const n=Math.max(1,(new Date(hotel.date_checkout)-new Date(hotel.date_checkin))/86400000);
      budget=(budget||0)+hotel.prix_nuit*n;
    }
    return`<div class="voyage-card" style="animation-delay:${i*0.04}s">
  <div class="voyage-header">
    <div class="voyage-left">
      <div class="voyage-emoji">🗺</div>
      <div>
        <div class="voyage-name">${v.nom||'Sans nom'}</div>
        <div class="voyage-sub">${v.destination||''}${v.date_debut?' · '+fmtDate(v.date_debut)+' → '+fmtDate(v.date_fin):''}</div>
        ${budget?`<div class="voyage-budget">💰 Budget total estimé: ${Math.round(budget)}€</div>`:''}
      </div>
    </div>
    ${!READONLY?`<button class="delete-btn" onclick="deleteItem('triporga_voyages',${v.id})">✕</button>`:''}
  </div>
  ${v.notes?`<div class="voyage-notes">💬 ${v.notes}</div>`:''}
  ${vol||hotel?`<div class="voyage-linked">
    ${vol?`<div class="voyage-linked-item"><div class="voyage-linked-label">✈️ Vol</div>${vol.origine}→${vol.destination}${vol.date_aller?' · '+fmtDate(vol.date_aller):''}${vol.prix?' · '+Math.round(vol.prix)+'€':''}</div>`:''}
    ${hotel?`<div class="voyage-linked-item"><div class="voyage-linked-label">🏨 Hôtel</div>${hotel.nom_hotel||hotel.destination}${hotel.date_checkin?' · '+fmtDate(hotel.date_checkin):''}${hotel.prix_nuit?' · '+Math.round(hotel.prix_nuit)+'€/nuit':''}</div>`:''}
  </div>`:'<div style="font-size:0.77rem;color:var(--muted);margin-bottom:0.7rem">Aucun vol ni hôtel attaché.</div>'}

    ${vol&&vol.lien?`<a class="voyage-btn" href="${vol.lien}" target="_blank" rel="noopener">✈️ Réserver vol ↗</a>`:''}
    ${hotel&&hotel.lien?`<a class="voyage-btn" href="${hotel.lien}" target="_blank" rel="noopener">🏨 Réserver hôtel ↗</a>`:''}
  </div>
</div>`;
  }).join('');
}

// UNDO DELETE
function deleteItem(table,id){
  // Show undo toast
  pendingDelete={table,id};
  const existing=document.getElementById('undoToast');
  if(existing)existing.remove();
  const t=document.createElement('div');
  t.id='undoToast';t.className='undo-toast';
  t.innerHTML=`Supprimé <button class="undo-btn" onclick="undoDelete()">↩ Annuler</button>`;
  document.body.appendChild(t);
  // Griser la carte visuellement
  const cards=document.querySelectorAll('.vol-card,.hotel-card,.voyage-card');
  // Timeout 4 secondes pour confirmer
  pendingDelete.timer=setTimeout(async()=>{
    if(!pendingDelete)return;
    await fetch(`${SB_URL}/rest/v1/${pendingDelete.table}?id=eq.${pendingDelete.id}`,{method:'DELETE',headers:H});
    pendingDelete=null;
    t.remove();
    await loadAll();
  },4000);
}

function undoDelete(){
  if(!pendingDelete)return;
  clearTimeout(pendingDelete.timer);
  pendingDelete=null;
  const t=document.getElementById('undoToast');
  if(t)t.remove();
  showToast('↩ Suppression annulée');
}

async function saveVol(){
  const body=getVolBody();
  if(!body.destination)return showToast('⚠️ Destination obligatoire');
  if(editingId){
    await fetch(`${SB_URL}/rest/v1/triporga_vols?id=eq.${editingId}`,{method:'PATCH',headers:{...H,Prefer:'return=minimal'},body:JSON.stringify(body)});
    showToast('✅ Vol mis à jour !');
  } else {
    await fetch(`${SB_URL}/rest/v1/triporga_vols`,{method:'POST',headers:{...H,Prefer:'return=minimal'},body:JSON.stringify(body)});
    showToast('✅ Vol ajouté !');
  }
  editingId=null;closeModals();await loadAll();
}

async function saveVoyage(){
  const body={
    nom:document.getElementById('voyage_nom').value,
    destination:document.getElementById('voyage_destination').value||null,
    date_debut:document.getElementById('voyage_debut').value||null,
    date_fin:document.getElementById('voyage_fin').value||null,
    notes:document.getElementById('voyage_notes').value||null,
    vol_id:document.getElementById('voyage_vol').value||null,
    hotel_id:document.getElementById('voyage_hotel').value||null,
  };
  if(!body.nom)return showToast('⚠️ Nom obligatoire');
  await fetch(`${SB_URL}/rest/v1/triporga_voyages`,{method:'POST',headers:{...H,Prefer:'return=minimal'},body:JSON.stringify(body)});
  closeModals();showToast('✅ Voyage créé !');await loadAll();
}

function fillVolForm(v){
  document.getElementById('vol_origine').value=v.origine||'CDG';
  document.getElementById('vol_destination').value=v.destination||'';
  document.getElementById('vol_iata_dest').value=v.iata_destination||'';
  document.getElementById('vol_prix').value=v.prix||'';
  document.getElementById('vol_compagnie').value=v.compagnie||'';
  document.getElementById('vol_compagnie_retour').value=v.compagnie_retour||'';
  document.getElementById('vol_aller').value=v.date_aller||'';
  document.getElementById('vol_retour').value=v.date_retour||'';
  document.getElementById('vol_hdep').value=v.heure_depart_aller||'';
  document.getElementById('vol_harr').value=v.heure_arrivee_aller||'';
  document.getElementById('vol_rhdep').value=v.heure_depart_retour||'';
  document.getElementById('vol_rharr').value=v.heure_arrivee_retour||'';
  document.getElementById('vol_num_aller').value=v.num_vol_aller||'';
  document.getElementById('vol_num_retour').value=v.num_vol_retour||'';
  document.getElementById('vol_dur_aller').value=v.duree_aller||'';
  document.getElementById('vol_dur_retour').value=v.duree_retour||'';
  document.getElementById('vol_lien').value=v.lien||'';
  document.getElementById('vol_notes').value=v.notes||'';
  document.getElementById('vol_voyage').value=v.voyage_id||'';
  const hasEscale=!!v.escale_ville;
  document.getElementById('vol_escale_toggle').checked=hasEscale;
  document.getElementById('escale-fields').style.display=hasEscale?'block':'none';
  document.getElementById('vol_escale').value=v.escale_ville||'';
  if(v.compagnie)onAirlineInput(v.compagnie);
}

function openEditVol(id){
  const v=data.vols.find(x=>x.id===id);if(!v)return;
  editingId=id;
  document.getElementById('modalVolTitle').textContent='Modifier le vol';
  fillVolForm(v);
  document.getElementById('modalVol').classList.add('open');
}

function copyVol(id){
  const v=data.vols.find(x=>x.id===id);if(!v)return;
  editingId=null;
  document.getElementById('modalVolTitle').textContent='Copier ce vol';
  fillVolForm(v);
  document.getElementById('vol_aller').value='';
  document.getElementById('vol_retour').value='';
  document.getElementById('modalVol').classList.add('open');
}

function openEditHotel(id){
  const h=data.hotels.find(x=>x.id===id);if(!h)return;
  editingId=id;
  document.getElementById('modalHotelTitle').textContent="Modifier l'hôtel";
  document.getElementById('hotel_destination').value=h.destination||'';
  document.getElementById('hotel_nom').value=h.nom_hotel||'';
  document.getElementById('hotel_quartier').value=h.quartier||'';
  document.getElementById('hotel_prix').value=h.prix_nuit||'';
  document.getElementById('hotel_note').value=h.note_hotel||'';
  document.getElementById('hotel_checkin').value=h.date_checkin||'';
  document.getElementById('hotel_checkout').value=h.date_checkout||'';
  document.getElementById('hotel_lien').value=h.lien||'';
  document.getElementById('hotel_notes').value=h.notes||'';
  document.getElementById('hotel_voyage').value=h.voyage_id||'';
  setStar(h.etoiles||0);
  onHotelLinkInput(h.lien||'');
  updateNightsPreview();
  document.getElementById('modalHotel').classList.add('open');
}

function openAddModal(){
  if(READONLY)return;
  editingId=null;
  if(currentTab==='vols'){
    document.getElementById('modalVolTitle').textContent='Ajouter un vol';
    ['vol_destination','vol_prix','vol_compagnie','vol_compagnie_retour','vol_aller','vol_retour','vol_hdep','vol_harr','vol_rhdep','vol_rharr','vol_num_aller','vol_num_retour','vol_dur_aller','vol_dur_retour','vol_lien','vol_notes','vol_escale'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=''});
    document.getElementById('vol_origine').value='CDG';
    document.getElementById('vol_iata_dest').value='';
    document.getElementById('vol_escale_toggle').checked=false;
    document.getElementById('escale-fields').style.display='none';
    document.getElementById('airline-preview').style.display='none';
    document.getElementById('dur-preview-aller').style.display='none';
    document.getElementById('dur-preview-retour').style.display='none';
    document.getElementById('modalVol').classList.add('open');
  } else if(currentTab==='hotels'){
    document.getElementById('modalHotelTitle').textContent='Ajouter un hôtel';
    ['hotel_destination','hotel_nom','hotel_quartier','hotel_prix','hotel_note','hotel_checkin','hotel_checkout','hotel_lien','hotel_notes'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=''});
    setStar(0);
    document.getElementById('hotel_lp').style.display='none';
    document.getElementById('nights-preview').style.display='none';
    document.getElementById('modalHotel').classList.add('open');
  } else {
    ['voyage_nom','voyage_destination','voyage_notes','voyage_debut','voyage_fin'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=''});
    document.getElementById('voyage_vol').value='';
    document.getElementById('voyage_hotel').value='';
    document.getElementById('modalVoyage').classList.add('open');
  }
}

function closeModals(){document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.remove('open'));editingId=null;}
function switchTab(tab,el){currentTab=tab;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');const labels={vols:'+ Vol',hotels:'+ Hôtel',voyages:'+ Voyage'};document.getElementById('mainAddBtn').textContent=labels[tab];renderCurrent();}
function setSort(sort,el){currentSort=sort;document.querySelectorAll('.filter-pills .fpill').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderCurrent();}
function setOrigin(o,el){currentOrigin=o;document.querySelectorAll('#originPills .fpill').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderCurrent();}
function resetFilters(){
  currentOrigin='all';currentSort='prix';
  document.getElementById('destFilter').value='all';
  document.getElementById('airlineFilter').value='all';
  document.getElementById('budgetFilter').value='';
  document.querySelectorAll('#originPills .fpill').forEach((b,i)=>b.classList.toggle('active',i===0));
  document.getElementById('sortPrix').classList.add('active');
  document.getElementById('sortDate').classList.remove('active');
  renderCurrent();
}
function previewLink(inputId,previewId){const val=document.getElementById(inputId).value;const preview=document.getElementById(previewId);if(val.startsWith('http')){preview.style.display='block';try{preview.textContent='🔗 '+new URL(val).hostname;}catch{preview.textContent=val.slice(0,50);}}else preview.style.display='none';}
function shareMode(){const url=window.location.origin+window.location.pathname+'?share=1';navigator.clipboard.writeText(url).then(()=>showToast('🔗 Lien copié !'));}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
document.querySelectorAll('.modal-overlay').forEach(m=>{m.addEventListener('click',e=>{if(e.target===m)closeModals()});});
if(READONLY)document.getElementById('mainAddBtn').style.display='none';
populateDataLists();
loadAll();
</script>
</body>
</html>
