<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TripOrga</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f5f2;--bg2:#efede9;--card:#fff;
  --border:#e8e4de;--border-dark:#d4cec6;
  --text:#141210;--text2:#3d3a36;--muted:#7a756f;
  --accent:#d4763b;--accent-light:#fdf0e6;--accent-dark:#a85a28;
  --green:#16a34a;--green-bg:#f0fdf4;
  --blue:#2563eb;--blue-bg:#eff6ff;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06);
  --shadow-md:0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.1);
  --radius:14px;--font:'Inter',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;-webkit-font-smoothing:antialiased}

header{background:rgba(255,255,255,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.logo{display:flex;align-items:center;gap:0.6rem}
.logo-text{font-size:1.1rem;font-weight:700;letter-spacing:-0.02em}
.logo-text em{color:var(--accent);font-style:normal}
.header-right{display:flex;align-items:center;gap:0.75rem}
.share-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text2);padding:0.4rem 0.9rem;border-radius:8px;font-size:0.78rem;font-weight:500;cursor:pointer;font-family:var(--font);transition:all 0.15s;display:flex;align-items:center;gap:0.35rem}
.share-btn:hover{border-color:var(--accent);color:var(--accent)}
.add-btn{background:var(--accent);border:none;color:#fff;padding:0.4rem 0.9rem;border-radius:8px;font-size:0.78rem;font-weight:600;cursor:pointer;font-family:var(--font);transition:background 0.15s;display:flex;align-items:center;gap:0.35rem}
.add-btn:hover{background:var(--accent-dark)}

main{max-width:1100px;margin:0 auto;padding:1.75rem 1.5rem}

.tabs{display:flex;gap:0.2rem;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:0.25rem;width:fit-content;margin-bottom:1.5rem;box-shadow:var(--shadow-sm)}
.tab{padding:0.5rem 1.2rem;border-radius:8px;font-size:0.85rem;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:var(--font);transition:all 0.15s;white-space:nowrap}
.tab:hover{color:var(--text2)}
.tab.active{background:var(--accent);color:#fff;font-weight:600}

.filter-bar{display:flex;gap:0.5rem;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center}
.filter-select{background:var(--card);border:1px solid var(--border);color:var(--text2);padding:0.35rem 0.75rem;border-radius:8px;font-size:0.8rem;font-family:var(--font);cursor:pointer;outline:none}
.filter-select:focus{border-color:var(--accent)}
.sort-btn{background:var(--card);border:1px solid var(--border);color:var(--text2);padding:0.32rem 0.8rem;border-radius:8px;font-size:0.78rem;font-weight:500;cursor:pointer;font-family:var(--font);transition:all 0.15s}
.sort-btn:hover{border-color:var(--accent);color:var(--accent)}
.sort-btn.active{background:var(--accent-light);border-color:var(--accent);color:var(--accent-dark)}

.section-title{font-size:0.65rem;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:1rem;display:flex;align-items:center;gap:0.75rem}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:0.875rem}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;box-shadow:var(--shadow-sm);animation:fadeUp 0.2s ease both;transition:all 0.15s}
.card:hover{box-shadow:var(--shadow-md);border-color:var(--border-dark)}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

.card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.875rem}
.card-title{font-size:1rem;font-weight:700;color:var(--text);letter-spacing:-0.01em}
.card-subtitle{font-size:0.75rem;color:var(--muted);margin-top:0.2rem}
.card-actions{display:flex;gap:0.35rem;flex-shrink:0}
.card-action-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:0.2rem 0.5rem;border-radius:6px;font-size:0.72rem;cursor:pointer;font-family:var(--font);transition:all 0.15s}
.card-action-btn:hover{border-color:var(--border-dark);color:var(--text2)}
.card-action-btn.delete:hover{border-color:#dc2626;color:#dc2626}

.card-body{display:flex;flex-direction:column;gap:0.5rem;margin-bottom:0.875rem}
.card-row{display:flex;align-items:center;gap:0.5rem;font-size:0.82rem;color:var(--text2)}
.card-icon{font-size:0.85rem;width:18px;flex-shrink:0}
.card-notes{font-size:0.78rem;color:var(--muted);background:var(--bg);border-radius:8px;padding:0.5rem 0.75rem;font-style:italic;margin-top:0.25rem}

.card-footer{display:flex;align-items:center;justify-content:space-between}
.price-tag{font-size:1.6rem;font-weight:700;color:var(--accent);letter-spacing:-0.03em;line-height:1}
.price-label{font-size:0.63rem;color:var(--muted);margin-top:0.1rem}
.visit-btn{display:inline-flex;align-items:center;gap:0.4rem;background:var(--accent-light);color:var(--accent-dark);border:1px solid rgba(212,118,59,0.25);padding:0.45rem 0.9rem;border-radius:8px;font-size:0.78rem;font-weight:600;text-decoration:none;transition:all 0.15s;font-family:var(--font)}
.visit-btn:hover{background:var(--accent);color:#fff}

/* VOYAGE CARDS */
.voyage-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;box-shadow:var(--shadow-sm);animation:fadeUp 0.2s ease both;transition:all 0.15s;border-left:3px solid var(--accent)}
.voyage-card:hover{box-shadow:var(--shadow-md)}
.voyage-tag{display:inline-flex;align-items:center;gap:0.3rem;background:var(--accent-light);color:var(--accent-dark);border:1px solid rgba(212,118,59,0.2);padding:0.2rem 0.6rem;border-radius:20px;font-size:0.7rem;font-weight:600;margin-bottom:0.5rem}
.voyage-linked{display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.75rem}
.linked-chip{display:flex;align-items:center;gap:0.3rem;background:var(--bg2);border:1px solid var(--border);padding:0.25rem 0.6rem;border-radius:6px;font-size:0.75rem;color:var(--text2)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:300;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:1.75rem;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:fadeUp 0.2s ease}
.modal-title{font-size:1.1rem;font-weight:700;margin-bottom:1.25rem;color:var(--text)}
.form-group{display:flex;flex-direction:column;gap:0.35rem;margin-bottom:1rem}
.form-group label{font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted)}
.form-input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:0.55rem 0.85rem;border-radius:8px;font-size:0.85rem;font-family:var(--font);outline:none;transition:border 0.15s;width:100%}
.form-input:focus{border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem}
.form-actions{display:flex;gap:0.5rem;justify-content:flex-end;margin-top:1.25rem}
.btn-cancel{background:none;border:1px solid var(--border);color:var(--muted);padding:0.5rem 1.1rem;border-radius:8px;font-size:0.83rem;cursor:pointer;font-family:var(--font);transition:all 0.15s}
.btn-cancel:hover{border-color:var(--border-dark);color:var(--text2)}
.btn-save{background:var(--accent);border:none;color:#fff;padding:0.5rem 1.25rem;border-radius:8px;font-size:0.83rem;font-weight:600;cursor:pointer;font-family:var(--font);transition:background 0.15s}
.btn-save:hover{background:var(--accent-dark)}
.link-preview{font-size:0.75rem;color:var(--muted);margin-top:0.25rem;padding:0.35rem 0.6rem;background:var(--bg);border-radius:6px;word-break:break-all}

.state-box{grid-column:1/-1;text-align:center;padding:3rem 2rem;color:var(--muted)}
.state-box .icon{font-size:2rem;margin-bottom:0.75rem}
.state-box p{font-size:0.875rem;line-height:1.7}

.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:#fff;padding:0.6rem 1.1rem;border-radius:10px;font-size:0.82rem;font-weight:500;z-index:400;animation:fadeUp 0.2s ease;opacity:0;transition:opacity 0.3s}
.toast.show{opacity:1}

@media(max-width:640px){
  header{padding:0 1rem}
  main{padding:1rem}
  .grid{grid-template-columns:1fr}
  .tabs{width:100%}
  .tab{flex:1;text-align:center;font-size:0.78rem}
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <span style="font-size:1.3rem">🧳</span>
    <span class="logo-text">Trip<em>Orga</em></span>
  </div>
  <div class="header-right">
    <button class="share-btn" onclick="shareMode()">🔗 Partager</button>
    <button class="add-btn" id="mainAddBtn" onclick="openAddModal()">+ Ajouter</button>
  </div>
</header>

<main>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('vols',this)">✈️ Vols</button>
    <button class="tab" onclick="switchTab('hotels',this)">🏨 Hôtels</button>
    <button class="tab" onclick="switchTab('voyages',this)">🗺 Voyages</button>
  </div>

  <div class="filter-bar">
    <select class="filter-select" id="destFilter" onchange="renderCurrent()">
      <option value="all">Toutes destinations</option>
    </select>
    <button class="sort-btn active" id="sortPrice" onclick="setSort('prix',this)">💶 Prix</button>
    <button class="sort-btn" id="sortDate" onclick="setSort('date',this)">📅 Date</button>
    <button class="sort-btn" id="sortDest" onclick="setSort('dest',this)">🌍 Destination</button>
  </div>

  <div class="section-title" id="sectionTitle">Vols sauvegardés</div>
  <div class="grid" id="mainGrid">
    <div class="state-box"><div class="icon">✈️</div><p>Aucun vol ajouté.<br>Clique sur "+ Ajouter" pour commencer.</p></div>
  </div>
</main>

<!-- MODAL VOL -->
<div class="modal-overlay" id="modalVol">
  <div class="modal">
    <div class="modal-title">✈️ Ajouter un vol</div>
    <div class="form-row">
      <div class="form-group">
        <label>Origine</label>
        <input class="form-input" id="vol_origine" placeholder="Paris (CDG/ORY)" value="Paris"/>
      </div>
      <div class="form-group">
        <label>Destination</label>
        <input class="form-input" id="vol_destination" placeholder="Barcelone"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Date aller</label>
        <input class="form-input" id="vol_aller" type="date"/>
      </div>
      <div class="form-group">
        <label>Date retour</label>
        <input class="form-input" id="vol_retour" type="date"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Prix A/R (€)</label>
        <input class="form-input" id="vol_prix" type="number" placeholder="150"/>
      </div>
      <div class="form-group">
        <label>Compagnie</label>
        <input class="form-input" id="vol_compagnie" placeholder="Air France"/>
      </div>
    </div>
    <div class="form-group">
      <label>Lien (Skyscanner, AF, Google...)</label>
      <input class="form-input" id="vol_lien" placeholder="https://..." oninput="previewLink('vol_lien','vol_link_preview')"/>
      <div class="link-preview" id="vol_link_preview" style="display:none"></div>
    </div>
    <div class="form-group">
      <label>Rattacher à un voyage (optionnel)</label>
      <select class="form-input" id="vol_voyage"><option value="">— Aucun —</option></select>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <input class="form-input" id="vol_notes" placeholder="Bagages inclus, siège fenêtre..."/>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModals()">Annuler</button>
      <button class="btn-save" onclick="saveVol()">Sauvegarder</button>
    </div>
  </div>
</div>

<!-- MODAL HOTEL -->
<div class="modal-overlay" id="modalHotel">
  <div class="modal">
    <div class="modal-title">🏨 Ajouter un hôtel</div>
    <div class="form-group">
      <label>Ville / Destination</label>
      <input class="form-input" id="hotel_destination" placeholder="Barcelone"/>
    </div>
    <div class="form-group">
      <label>Nom de l'hôtel</label>
      <input class="form-input" id="hotel_nom" placeholder="Hotel Arts Barcelona"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Check-in</label>
        <input class="form-input" id="hotel_checkin" type="date"/>
      </div>
      <div class="form-group">
        <label>Check-out</label>
        <input class="form-input" id="hotel_checkout" type="date"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Prix / nuit (€)</label>
        <input class="form-input" id="hotel_prix" type="number" placeholder="89"/>
      </div>
      <div class="form-group">
        <label>Note (/10)</label>
        <input class="form-input" id="hotel_note" type="number" placeholder="8.5" min="0" max="10" step="0.1"/>
      </div>
    </div>
    <div class="form-group">
      <label>Lien (Booking, Hotels.com...)</label>
      <input class="form-input" id="hotel_lien" placeholder="https://..." oninput="previewLink('hotel_lien','hotel_link_preview')"/>
      <div class="link-preview" id="hotel_link_preview" style="display:none"></div>
    </div>
    <div class="form-group">
      <label>Rattacher à un voyage (optionnel)</label>
      <select class="form-input" id="hotel_voyage"><option value="">— Aucun —</option></select>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <input class="form-input" id="hotel_notes" placeholder="Petit déj inclus, vue mer..."/>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModals()">Annuler</button>
      <button class="btn-save" onclick="saveHotel()">Sauvegarder</button>
    </div>
  </div>
</div>

<!-- MODAL VOYAGE -->
<div class="modal-overlay" id="modalVoyage">
  <div class="modal">
    <div class="modal-title">🗺 Créer un voyage</div>
    <div class="form-group">
      <label>Nom du voyage</label>
      <input class="form-input" id="voyage_nom" placeholder="Weekend Barcelone mai"/>
    </div>
    <div class="form-group">
      <label>Destination</label>
      <input class="form-input" id="voyage_destination" placeholder="Barcelone"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Date début</label>
        <input class="form-input" id="voyage_debut" type="date"/>
      </div>
      <div class="form-group">
        <label>Date fin</label>
        <input class="form-input" id="voyage_fin" type="date"/>
      </div>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <input class="form-input" id="voyage_notes" placeholder="Idées, activités..."/>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModals()">Annuler</button>
      <button class="btn-save" onclick="saveVoyage()">Créer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL='https://idihvrjjhutgvvqauogz.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlkaWh2cmpqaHV0Z3Z2cWF1b2d6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNDA2MjEsImV4cCI6MjA5MjgxNjYyMX0.LsBCE-g4JI1rkG0x7UDpo8S676jmJ0JMISHZhnId6Zw';

const READONLY = new URLSearchParams(window.location.search).get('share') === '1';

let currentTab = 'vols';
let currentSort = 'prix';
let data = { vols: [], hotels: [], voyages: [] };

async function sb(table, method='GET', body=null, id=null) {
  const url = `${SB_URL}/rest/v1/${table}${id ? `?id=eq.${id}` : ''}`;
  const opts = {
    method,
    headers: {
      apikey: SB_KEY,
      Authorization: `Bearer ${SB_KEY}`,
      'Content-Type': 'application/json',
      Prefer: method === 'POST' ? 'return=representation' : '',
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(method === 'GET' ? `${SB_URL}/rest/v1/${table}?order=created_at.desc&limit=200` : url, opts);
  if (method === 'GET') return r.json();
  return r;
}

async function loadAll() {
  const [vols, hotels, voyages] = await Promise.all([
    sb('triporga_vols'),
    sb('triporga_hotels'),
    sb('triporga_voyages'),
  ]);
  data = { vols, hotels, voyages };
  updateDestFilter();
  populateVoyageSelects();
  renderCurrent();
}

function updateDestFilter() {
  const all = [...data.vols.map(v=>v.destination), ...data.hotels.map(h=>h.destination)].filter(Boolean);
  const unique = [...new Set(all)].sort();
  const sel = document.getElementById('destFilter');
  const cur = sel.value;
  sel.innerHTML = '<option value="all">Toutes destinations</option>';
  unique.forEach(d => {
    const o = document.createElement('option');
    o.value = d; o.textContent = d;
    if (d === cur) o.selected = true;
    sel.appendChild(o);
  });
}

function populateVoyageSelects() {
  ['vol_voyage','hotel_voyage'].forEach(id => {
    const sel = document.getElementById(id);
    if (!sel) return;
    sel.innerHTML = '<option value="">— Aucun —</option>';
    data.voyages.forEach(v => {
      const o = document.createElement('option');
      o.value = v.id; o.textContent = v.nom;
      sel.appendChild(o);
    });
  });
}

function getFiltered(items, dateField) {
  const dest = document.getElementById('destFilter').value;
  let d = items;
  if (dest !== 'all') d = d.filter(x => x.destination === dest);
  if (currentSort === 'prix') d.sort((a,b) => (a.prix||a.prix_nuit||0)-(b.prix||b.prix_nuit||0));
  else if (currentSort === 'date') d.sort((a,b) => new Date(a[dateField]||0)-new Date(b[dateField]||0));
  else if (currentSort === 'dest') d.sort((a,b) => (a.destination||'').localeCompare(b.destination||''));
  return d;
}

function fmtDate(str) {
  if (!str) return '—';
  return new Date(str).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});
}

function renderCurrent() {
  const titles = {vols:'Vols sauvegardés',hotels:'Hôtels sauvegardés',voyages:'Voyages planifiés'};
  document.getElementById('sectionTitle').childNodes[0].textContent = titles[currentTab];
  if (currentTab === 'vols') renderVols();
  else if (currentTab === 'hotels') renderHotels();
  else renderVoyages();
}

function renderVols() {
  const grid = document.getElementById('mainGrid');
  const items = getFiltered(data.vols, 'date_aller');
  if (!items.length) {
    grid.innerHTML = `<div class="state-box"><div class="icon">✈️</div><p>Aucun vol ajouté.<br>Clique sur "+ Ajouter" pour commencer.</p></div>`;
    return;
  }
  grid.innerHTML = items.map((v,i) => `
<div class="card" style="animation-delay:${i*0.04}s">
  <div class="card-header">
    <div>
      <div class="card-title">${v.origine||'Paris'} → ${v.destination||'?'}</div>
      <div class="card-subtitle">${v.compagnie||'Compagnie inconnue'}</div>
    </div>
    ${!READONLY ? `<div class="card-actions">
      <button class="card-action-btn delete" onclick="deleteItem('triporga_vols',${v.id})">✕</button>
    </div>` : ''}
  </div>
  <div class="card-body">
    <div class="card-row"><span class="card-icon">🛫</span> Aller : ${fmtDate(v.date_aller)}</div>
    <div class="card-row"><span class="card-icon">🛬</span> Retour : ${fmtDate(v.date_retour)}</div>
    ${v.notes ? `<div class="card-notes">💬 ${v.notes}</div>` : ''}
  </div>
  <div class="card-footer">
    <div>
      <div class="price-tag">${v.prix ? Math.round(v.prix)+'€' : '—'}</div>
      <div class="price-label">aller-retour · éco</div>
    </div>
    ${v.lien ? `<a class="visit-btn" href="${v.lien}" target="_blank" rel="noopener">Voir le vol ↗</a>` : ''}
  </div>
</div>`).join('');
}

function renderHotels() {
  const grid = document.getElementById('mainGrid');
  const items = getFiltered(data.hotels, 'date_checkin');
  if (!items.length) {
    grid.innerHTML = `<div class="state-box"><div class="icon">🏨</div><p>Aucun hôtel ajouté.<br>Clique sur "+ Ajouter" pour commencer.</p></div>`;
    return;
  }
  grid.innerHTML = items.map((h,i) => {
    const nights = h.date_checkin && h.date_checkout
      ? Math.max(1, (new Date(h.date_checkout)-new Date(h.date_checkin))/(1000*60*60*24))
      : 1;
    return `
<div class="card" style="animation-delay:${i*0.04}s">
  <div class="card-header">
    <div>
      <div class="card-title">${h.nom_hotel||h.destination||'Hôtel'}</div>
      <div class="card-subtitle">${h.destination||''} ${h.note_hotel ? '· ⭐ '+h.note_hotel+'/10' : ''}</div>
    </div>
    ${!READONLY ? `<div class="card-actions">
      <button class="card-action-btn delete" onclick="deleteItem('triporga_hotels',${h.id})">✕</button>
    </div>` : ''}
  </div>
  <div class="card-body">
    <div class="card-row"><span class="card-icon">📅</span> Check-in : ${fmtDate(h.date_checkin)}</div>
    <div class="card-row"><span class="card-icon">📅</span> Check-out : ${fmtDate(h.date_checkout)}</div>
    <div class="card-row"><span class="card-icon">🌙</span> ${nights} nuit${nights>1?'s':''}</div>
    ${h.notes ? `<div class="card-notes">💬 ${h.notes}</div>` : ''}
  </div>
  <div class="card-footer">
    <div>
      <div class="price-tag">${h.prix_nuit ? Math.round(h.prix_nuit)+'€' : '—'}</div>
      <div class="price-label">par nuit · 2 personnes</div>
    </div>
    ${h.lien ? `<a class="visit-btn" href="${h.lien}" target="_blank" rel="noopener">Voir l'hôtel ↗</a>` : ''}
  </div>
</div>`;
  }).join('');
}

function renderVoyages() {
  const grid = document.getElementById('mainGrid');
  const items = [...data.voyages].sort((a,b)=>new Date(a.date_debut||0)-new Date(b.date_debut||0));
  if (!items.length) {
    grid.innerHTML = `<div class="state-box"><div class="icon">🗺</div><p>Aucun voyage créé.<br>Clique sur "+ Ajouter" pour commencer.</p></div>`;
    return;
  }
  grid.innerHTML = items.map((v,i) => {
    const linkedVols = data.vols.filter(x=>x.voyage_id==v.id);
    const linkedHotels = data.hotels.filter(x=>x.voyage_id==v.id);
    return `
<div class="voyage-card" style="animation-delay:${i*0.04}s">
  <div class="card-header">
    <div>
      <div class="voyage-tag">🗺 Voyage</div>
      <div class="card-title">${v.nom||'Sans nom'}</div>
      <div class="card-subtitle">${v.destination||''} · ${fmtDate(v.date_debut)} → ${fmtDate(v.date_fin)}</div>
    </div>
    ${!READONLY ? `<div class="card-actions">
      <button class="card-action-btn delete" onclick="deleteItem('triporga_voyages',${v.id})">✕</button>
    </div>` : ''}
  </div>
  ${v.notes ? `<div class="card-notes">💬 ${v.notes}</div>` : ''}
  ${linkedVols.length||linkedHotels.length ? `
  <div class="voyage-linked">
    ${linkedVols.map(x=>`<div class="linked-chip">✈️ ${x.origine}→${x.destination} ${x.prix?x.prix+'€':''}</div>`).join('')}
    ${linkedHotels.map(x=>`<div class="linked-chip">🏨 ${x.nom_hotel||x.destination} ${x.prix_nuit?x.prix_nuit+'€/nuit':''}</div>`).join('')}
  </div>` : ''}
</div>`;
  }).join('');
}

async function saveVol() {
  const body = {
    origine: document.getElementById('vol_origine').value || 'Paris',
    destination: document.getElementById('vol_destination').value,
    date_aller: document.getElementById('vol_aller').value || null,
    date_retour: document.getElementById('vol_retour').value || null,
    prix: parseFloat(document.getElementById('vol_prix').value) || null,
    compagnie: document.getElementById('vol_compagnie').value || null,
    lien: document.getElementById('vol_lien').value || null,
    notes: document.getElementById('vol_notes').value || null,
    voyage_id: document.getElementById('vol_voyage').value || null,
  };
  if (!body.destination) return showToast('Destination obligatoire');
  await fetch(`${SB_URL}/rest/v1/triporga_vols`, {
    method:'POST',
    headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,'Content-Type':'application/json',Prefer:'return=minimal'},
    body:JSON.stringify(body)
  });
  closeModals();
  showToast('✅ Vol ajouté !');
  await loadAll();
}

async function deleteItem(table, id) {
  if (!confirm('Supprimer ce deal ?')) return;
  await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
    method:'DELETE',
    headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`}
  });
  showToast('🗑 Supprimé');
  await loadAll();
}

function openAddModal() {
  if (READONLY) return;
  if (currentTab === 'vols') document.getElementById('modalVol').classList.add('open');
  else if (currentTab === 'hotels') document.getElementById('modalHotel').classList.add('open');
  else document.getElementById('modalVoyage').classList.add('open');
}

function closeModals() {
  document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open'));
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const labels = {vols:'+ Vol',hotels:'+ Hôtel',voyages:'+ Voyage'};
  document.getElementById('mainAddBtn').textContent = labels[tab];
  renderCurrent();
}

function setSort(sort, el) {
  currentSort = sort;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderCurrent();
}

function previewLink(inputId, previewId) {
  const val = document.getElementById(inputId).value;
  const preview = document.getElementById(previewId);
  if (val.startsWith('http')) {
    preview.style.display = 'block';
    try { preview.textContent = new URL(val).hostname; } catch { preview.textContent = val.slice(0,50); }
  } else {
    preview.style.display = 'none';
  }
}

function shareMode() {
  const url = window.location.origin + window.location.pathname + '?share=1';
  navigator.clipboard.writeText(url).then(() => showToast('🔗 Lien copié ! Partage-le à ta copine.'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) closeModals(); });
});

if (READONLY) {
  document.getElementById('mainAddBtn').style.display = 'none';
}

loadAll();
</script>
</body>
</html>
